<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul De Rang</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
  <div class="watermark">
    AHMED BECHIR TEBOURBI | IPEIB
  </div>
  <br>
  <h2>NOTES:</h2>
  <form action="/submit" method="POST">
    <div class="tab-container">
      <div class="box-tab active" data-value="MP">MP</div>
      <div class="box-tab" data-value="PC">PC</div>
      <div class="box-tab" data-value="T">T</div>
      <div class="box-tab" data-value="BG">BG</div>
    </div>
    <div class="main-box">
      <div class="input-group">
        <label for="analyse">Math I:</label>
        <input type="number" id="analyse" name="grades" min="0" max="20" step="1" value="0">
        <label for="analyse-rang">0</label>
      </div>
      <div class="input-group">
        <label for="algebre">Math II:</label>
        <input type="number" id="algebre" name="grades" min="0" max="20" step="1" value="0">
        <label for="algebre-rang">0</label>
      </div>
      <div class="input-group">
        <label for="physique">Physique:</label>
        <input type="number" id="physique" name="grades" min="0" max="20" step="1" value="0">
        <label for="physique-rang">0</label>
      </div>
      <div class="input-group">
        <label for="chimie">Chimie Inorganique:</label>
        <input type="number" id="chimie" name="grades" min="0" max="20" step="1" value="0">
          <label for="chimie-rang">0</label>
      </div>
      <div class="input-group">
        <label for="informatique">Informatique:</label>
        <input type="number" id="informatique" name="grades" min="0" max="20" step="1" value="0">
        <label for="informatique-rang">0</label>
      </div>
      <div class="input-group">
        <label for="anglais">Anglais:</label>
        <input type="number" id="anglais" name="grades" min="0" max="20" step="1" value="0">
        <label for="anglais">0</label>
      </div>
      <div class="input-group">
        <label for="francais">Français:</label>
        <input type="number" id="francais" name="grades" min="0" max="20" step="1" value="0">
        <label for="francais-rang">0</label>
      </div>
      <div class="input-group">
        <label for="sta">STA:</label>
        <input type="number" id="sta" name="grades" min="0" max="20" step="1" value="0">
        <label for="sta-rang">0</label>
      </div>
      <div class="input-group hidden-element" id="group-genetique">
        <label for="genetique">Génétique:</label>
        <input type="number" id="genetique" name="grades" min="0" max="20" step="1" value="0">
        <label for="genetique-rang">0</label>
      </div>
      <div class="input-group hidden-element" id="group-animale">
        <label for="animale">Biologie Animale:</label>
        <input type="number" id="animale" name="grades" min="0" max="20" step="1" value="0">
        <label for="animale-rang">0</label>
      </div>
      <div class="input-group hidden-element" id="group-vegetale">
        <label for="vegetale">Biologie Végétale:</label>
        <input type="number" id="vegetale" name="grades" min="0" max="20" step="1" value="0">
        <label for="vegetale-rang">0</label>
      </div>
      <div class="input-group">
        <label for="year">Année:</label>
        <select id="year" name="year">
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
      </div>
      <div class="input-group">
        <label for="bonus">Bonus (Sans Redoublage):</label>
        <input type="checkbox" id="bonus">
      </div>
      <div id="result">Rang ≈ 0</div>
      <div id="result2">Moyenne = 0</div>
    </div>
  </form>
  <script src="Javascript.js"></script>
</body>
</html>
